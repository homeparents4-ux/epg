name: Manual EPG Grab
on:
  schedule:
    - cron: '0 17 * * *' # Jam 00:00 WIB
  workflow_dispatch:

jobs:
  grab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install
        run: npm install

      - name: Grab EPG
        # Perintah '|| true' memastikan robot tidak berhenti jika satu site gagal
        run: |
          npm run grab -- --site=indihometv.com || true
          npm run grab -- --site=mncvision.id || true

      - name: Simpan Hasil
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p guides
          git add guides/*.xml
          git commit -m "Update EPG" || echo "Tidak ada perubahan file"
          git push
