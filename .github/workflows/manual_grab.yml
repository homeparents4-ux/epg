name: Auto EPG Grabber Final

on:
  workflow_dispatch: # Tombol Manual
  schedule:
    - cron: '0 */6 * * *' # Otomatis setiap 6 jam

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  grab:
    runs-on: ubuntu-latest
    # Memberikan izin tulis agar bot bisa update file di repo Fork
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Grab EPG Data
        run: |
          echo "Mengambil data dari Vidio..."
          npm run grab -- --site=vidio.com
          
          echo "Jeda 15 detik agar tidak diblokir..."
          sleep 15
          
          echo "Mengambil data dari Indihome..."
          npm run grab -- --site=indihometv.com

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Paksa Git untuk memantau semua file XML di folder guides
          git add guides/*.xml
          
          # Menggunakan --allow-empty agar tanggal folder PASTI berubah 
          # meskipun data yang di-grab sama dengan data lama.
          git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') [skip ci]" --allow-empty
          
          # Push ke branch master
          git push origin master
