name: Auto EPG Grabber Final

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  grab:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Grab EPG Data
        run: |
          # 1. Pastikan folder guides ada dan kosongkan file lama
          mkdir -p guides
          rm -f guides/guide.xml
          
          # 2. Buat file konfigurasi sementara agar grabber menggabungkan site secara rapi
          # Cara ini akan menghasilkan 1 file XML yang valid (tidak ada junk)
          echo '{ "sites": [ { "site": "vidio.com" }, { "site": "indihometv.com" } ] }' > custom.config.json
          
          # 3. Jalankan grabber menggunakan config tersebut
          echo "Memulai Grab Gabungan (Vidio & Indihome)..."
          npm run grab -- --config=custom.config.json --output=guides/guide.xml
          
          # 4. Tambahkan baris kosong di paling bawah agar Git deteksi perubahan
          echo " " >> guides/guide.xml

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          echo "Terakhir dijalankan: $(date)" > guides/last_run.txt
          
          # Tambahkan file utama yang sudah bersih
          git add guides/guide.xml guides/last_run.txt
          
          git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') [skip ci]" --allow-empty
          git push origin master
