name: Manual EPG Grab
on:
  schedule:
    - cron: '0 17 * * *' # Jam 00:00 WIB
  workflow_dispatch:

jobs:
  grab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0 # Mengambil seluruh riwayat agar tidak error 128

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm' # Menghapus sisa-sisa instalasi lama yang mungkin rusak
      - name: Install
        run: npm install

      - name: Grab EPG
        # Gunakan '|| true' agar jika satu situs gagal, proses tetap lanjut ke simpan
        run: |
          npm run grab -- --site=indihometv.com || true
          npm run grab -- --site=vidio.com || true

      - name: Simpan Hasil
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p guides
          # Kita pindahkan file hasil grab tadi ke dalam folder guides agar rapi
          mv *.xml guides/ || echo "File sudah di folder yang benar"
          git add guides/*.xml
          git commit -m "Update EPG Indonesia" || echo "Tidak ada perubahan"
          git push origin HEAD --force
