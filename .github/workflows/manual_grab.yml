name: Auto EPG Grabber Final

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  grab:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Grab EPG Data
        run: |
          # 1. Hapus file lama agar benar-benar fresh
          rm -f guides/guide.xml
          
          # 2. Grab VIDIO dulu (membuat file baru)
          echo "Memulai Grab Vidio..."
          npm run grab -- --site=vidio.com --output=guides/guide.xml
          
          echo "Jeda 15 detik..."
          sleep 15
          
          # 3. Grab INDIHOME dan tambahkan (APPEND) ke file yang sama
          # Menggunakan flag --append agar data Vidio tidak hilang tertimpa Indihome
          echo "Memulai Grab Indihome..."
          npm run grab -- --site=indihometv.com --output=guides/guide.xml --append
          
          # 4. Tambahkan spasi kosong agar Git deteksi perubahan
          echo " " >> guides/guide.xml

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          echo "Terakhir dijalankan: $(date)" > guides/last_run.txt
          
          git add guides/guide.xml guides/last_run.txt
          
          git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') [skip ci]" --allow-empty
          git push origin master
