name: Auto EPG Grabber Final

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  grab:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Grab EPG Data
        run: |
          # 1. Pastikan folder guides ada
          mkdir -p guides
          
          # 2. Grab Vidio (disimpan ke file sementara)
          echo "Memulai Grab Vidio..."
          npm run grab -- --site=vidio.com --output=guides/vidio.xml
          
          # 3. Grab Indihome (disimpan ke file sementara)
          echo "Memulai Grab Indihome..."
          npm run grab -- --site=indihometv.com --output=guides/indihome.xml
          
          # 4. PROSES PENGGABUNGAN (Anti-Junk / Menghilangkan Error XML)
          # Ambil semua isi Vidio kecuali baris paling akhir (menghapus </tv>)
          head -n -1 guides/vidio.xml > guides/guide.xml
          
          # Ambil isi Indihome, buang 2 baris teratas (<?xml dan <tv), lalu tempelkan sisanya
          sed '1,2d' guides/indihome.xml >> guides/guide.xml
          
          # 5. Tambahkan baris kosong agar Git deteksi perubahan
          echo " " >> guides/guide.xml

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          echo "Terakhir dijalankan: $(date)" > guides/last_run.txt
          
          # Kita hanya simpan file utama dan log waktu
          git add guides/guide.xml guides/last_run.txt
          
          git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') [skip ci]" --allow-empty
          git push origin master
