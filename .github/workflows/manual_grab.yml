name: Manual EPG Grab
on:
  schedule:
    - cron: '0 17 * * *' # Jam 00:00 WIB
  workflow_dispatch:

jobs:
  grab:
    runs-on: ubuntu-latest
steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm' # Menghapus sisa-sisa instalasi lama yang mungkin rusak
      - name: Install
        run: npm install

      - name: Grab EPG
        # Gunakan '|| true' agar jika satu situs gagal, proses tetap lanjut ke simpan
        run: |
          npm run grab -- --site=indihometv.com || true
          npm run grab -- --site=vidio.com || true

      - name: Config Git and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add guides/guide.xml
          # Perintah || true di bawah ini agar workflow tidak error jika tidak ada data baru
          git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M')" || true
          git push origin master
