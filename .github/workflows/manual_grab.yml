name: Manual EPG Grab
on:
  schedule:
    - cron: '0 17 * * *' # Otomatis jam 00:00 WIB
  workflow_dispatch:

jobs:
  grab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20' # WAJIB VERSI 20 KE ATAS

      - name: Install
        run: npm install

      - name: Grab EPG Indonesia
        # Kita jalankan Indihome dan Vidio sekaligus
        run: |
          npm run grab -- --site=indihometv.com || echo "Indihome Gagal"
       
      - name: Simpan Hasil
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p guides
          git add guides/*.xml
          git commit -m "Update EPG Indihome" || echo "Tidak ada perubahan file"
          git push
