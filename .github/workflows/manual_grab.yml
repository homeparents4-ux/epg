name: Manual EPG Grab
on:
  schedule:
    - cron: '0 17 * * *' # Otomatis jam 00:00 WIB
  workflow_dispatch:

jobs:
  grab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install
        run: npm install

      - name: Grab EPG Indonesia
        run: |
          npm run grab -- --site=indihometv.com
          npm run grab -- --site=mncvision.id

      - name: Gabungkan File
        run: |
          npx epg-grabber merge --input=guides/*.xml --output=guides/semua_channel.xml

      - name: Push Hasil
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add guides/
          git commit -m "Update EPG Indihome & MNC Jam 12 Malam" || exit 0
          git push
