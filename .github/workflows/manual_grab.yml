name: Auto EPG Grabber

on:
  workflow_dispatch:
  schedule:
    # Berjalan setiap 6 jam
    - cron: '0 */6 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  grab:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Grab EPG Data
        run: |
          # Grab Vidio.com
          echo "Memulai grab Vidio..."
          npm run grab -- --site=vidio.com
          
          # Jeda 15 detik agar tidak dianggap spam/bot oleh server
          echo "Menunggu 15 detik..."
          sleep 15
          
          # Grab Indihometv.com
          echo "Memulai grab Indihome..."
          npm run grab -- --site=indihometv.com
          
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Tambahkan semua file xml di folder guides
          git add guides/*.xml
          
          # Cek perubahan
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') [skip ci]"
            git push origin master
          else
            echo "Tidak ada perubahan data yang dideteksi."
          fi
