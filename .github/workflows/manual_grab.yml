name: Manual EPG Grab
on:
  workflow_dispatch:

jobs:
  grab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # WAJIB 20 untuk memperbaiki "ReferenceError: File is not defined"

      - name: Install Dependencies
        run: npm install

      - name: Grab EPG
        run: |
          # Grab Indihome dan Vidio sekaligus
          npm run grab -- --site=indihometv.com --site=vidio.com --max-connections=1

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add guides/guide.xml
          git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push origin master
