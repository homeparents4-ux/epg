name: Auto EPG Grabber

on:
  workflow_dispatch: # Agar bisa dijalankan manual kapan saja
  schedule:
    # Berjalan otomatis setiap 6 jam (00:00, 06:00, 12:00, 18:00 UTC)
    # WIB: 07:00, 13:00, 19:00, 01:00
    - cron: '0 */6 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  grab:
    runs-on: ubuntu-latest
    # Memberikan izin akses tulis agar bot bisa push hasil ke repo
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Mengaktifkan cache agar install lebih cepat

      - name: Install Dependencies
        run: npm ci

      - name: Grab EPG Data
        run: |
          npm run grab -- --site=indihometv.com --site=vidio.com

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Pastikan file guide.xml masuk ke dalam commit
          git add guides/guide.xml
          
          # Cek apakah ada perubahan (agar tidak error jika data sama)
          if [ -n "$(git status --porcelain guides/guide.xml)" ]; then
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') [skip ci]"
            git push origin master
          else
            echo "Tidak ada perubahan pada data EPG, melewati proses push."
          fi
