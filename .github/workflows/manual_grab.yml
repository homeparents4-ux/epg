name: Auto EPG Grabber Final

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  grab:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Grab EPG Data
        run: |
          # 1. Pastikan folder guides ada
          mkdir -p guides
          
          # 2. Grab Vidio (simpan sementara ke vidio.xml)
          echo "Memulai Grab Vidio..."
          npm run grab -- --site=vidio.com --output=guides/vidio.xml || echo "Vidio failed, skipping..."
          
          # 3. Grab Indihome (simpan sementara ke indihome.xml)
          echo "Memulai Grab Indihome..."
          npm run grab -- --site=indihometv.com --output=guides/indihome.xml || echo "Indihome failed, skipping..."
          
          # 4. Gabungkan hasil grab (Vidio + Indihome) ke dalam satu file guide.xml
          # Perintah ini akan mengambil isi kedua file dan memasukkannya ke guide.xml
          echo "Menggabungkan file..."
          cat guides/vidio.xml guides/indihome.xml > guides/guide.xml 2>/dev/null || true
          
          # Tambahkan baris kosong agar Git deteksi perubahan
          echo " " >> guides/guide.xml

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          echo "Terakhir dijalankan: $(date)" > guides/last_run.txt
          
          # Kita hanya add guide.xml dan last_run.txt (file vidio.xml & indihome.xml tidak perlu masuk repo)
          git add guides/guide.xml guides/last_run.txt
          
          git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') [skip ci]" --allow-empty
          git push origin master
